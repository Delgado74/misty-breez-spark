name: misty_breez
description: "Spark-powered Breez SDK wallet."
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=3.11.1 <4.0.0'
  flutter: ">=3.41.3"

workspace:
  - packages/breez_preferences
  - packages/sdk_connectivity_cubit
  - packages/device_client
  - packages/keychain
  - packages/lightning_links
  - packages/breez_logger
  - packages/breez_sdk_spark
  - packages/credentials_manager
  - packages/service_injector

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  breez_preferences:
    path: packages/breez_preferences
  sdk_connectivity_cubit:
    path: packages/sdk_connectivity_cubit
  device_client:
    path: packages/device_client
  keychain:
    path: packages/keychain
  lightning_links:
    path: packages/lightning_links
  breez_logger:
    path: packages/breez_logger
  breez_sdk_spark:
    path: packages/breez_sdk_spark
  credentials_manager:
    path: packages/credentials_manager
  service_injector:
    path: packages/service_injector

  breez_sdk_spark_flutter:
    path: /home/islabtc/AndroidStudioProjects/breezmisty/spark-sdk/packages/flutter
  flutter_rust_bridge: 2.11.1

  another_flushbar: ^1.12.32
  auto_size_text: ^3.0.0
  breez_translations:
    git:
      url: https://github.com/breez/Breez-Translations
      ref: 86d0d7e1c871a4ede69d867313d796089c956385
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.2.0
  diacritic: ^0.1.6
  drag_and_drop_lists:
    git:
      url: https://github.com/breez/DragAndDropLists
      ref: 38cc3155a6161730b4ec476d781873afb7ec4846
  email_validator: ^3.0.0
  extended_image: ^10.0.1
  flutter_bloc: ^9.1.1
  flutter_cache_manager: ^3.4.1
  flutter_fgbg: ^0.7.1
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: 9.2.4
  flutter_svg: ^2.2.2
  flutter_typeahead:
    git:
      url: https://github.com/breez/flutter_typeahead.git
      ref: 2766f3c3c64339e6beb0a0eea258de408383d0c7
  http: ^1.6.0
  hydrated_bloc: ^10.1.1
  image: ^4.8.0
  image_cropper: ^11.0.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  local_auth_darwin: ^2.0.3
  logging: ^1.3.0
  lottie: ^3.3.2
  mobile_scanner: ^7.2.0
  nested: any
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  rxdart: ^0.28.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  synchronized: ^3.4.0
  theme_provider: ^0.6.0
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  vector_math: ^2.2.0
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  breez_sdk_spark_flutter:
    path: /home/islabtc/AndroidStudioProjects/breezmisty/spark-sdk/packages/flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/animals/
    - assets/icons/vendors/
    - assets/animations/
    - assets/animations/welcome/
    - assets/animations/lottie/
  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: fonts/IBMPlexSans-Thin.otf
          weight: 100
        - asset: fonts/IBMPlexSans-ThinItalic.otf
          weight: 100
          style: italic
        - asset: fonts/IBMPlexSans-ExtraLight.otf
          weight: 200
        - asset: fonts/IBMPlexSans-ExtraLightItalic.otf
          weight: 200
          style: italic
        - asset: fonts/IBMPlexSans-Light.otf
          weight: 300
        - asset: fonts/IBMPlexSans-LightItalic.otf
          weight: 300
          style: italic
        - asset: fonts/IBMPlexSans-Regular.otf
          weight: 400
        - asset: fonts/IBMPlexSans-Italic.otf
          weight: 400
          style: italic
        - asset: fonts/IBMPlexSans-Medium.otf
          weight: 500
        - asset: fonts/IBMPlexSans-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/IBMPlexSans-SemiBold.otf
          weight: 600
        - asset: fonts/IBMPlexSans-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: fonts/IBMPlexSans-Bold.otf
          weight: 700
        - asset: fonts/IBMPlexSans-BoldItalic.otf
          weight: 700
          style: italic
    - family: icomoon
      fonts:
        - asset: fonts/icomoon.ttf
    - family: animals
      fonts:
        - asset: fonts/animals.ttf
    - family: Breez Logo
      fonts:
        - asset: fonts/breezlogo.ttf
    - family: ComfortaaBold
      fonts:
        - asset: fonts/Comfortaa-Bold.ttf
    - family: IBMPlexSansRegular
      fonts:
        - asset: fonts/IBMPlexSans-Regular.ttf
    - family: HacenTunisia
      fonts:
        - asset: fonts/Hacen-Tunisia.ttf
    - family: SAT
      fonts:
        - asset: fonts/sat.otf
