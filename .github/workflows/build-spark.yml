name: Build Spark

on:
  workflow_dispatch:

env:
  SDK_REF: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt-get clean

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout Spark SDK
        uses: actions/checkout@v4
        with:
          repository: breez/spark-sdk
          path: spark-sdk
          ref: ${{ env.SDK_REF }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Cargo (avoid HTTP/2 crates.io errors)
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [http]
          multiplexing = false
          [net]
          retry = 3
          EOF

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: spark-sdk/packages/flutter/rust/
          cache-all-crates: true

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Generate Dart bindings
        working-directory: spark-sdk/packages/flutter
        run: |
          mkdir -p lib/src/rust
          flutter_rust_bridge_codegen generate

      - name: Fix pubspec paths for CI
        working-directory: app
        run: |
          find . -name pubspec.yaml -exec sed -i \
            's|/home/islabtc/AndroidStudioProjects/breezmisty/spark-sdk/packages/flutter|../spark-sdk/packages/flutter|g' {} +

      - name: Create env.json
        working-directory: app
        run: |
          echo '{"API_KEY":"${{ secrets.BREEZ_API_KEY }}","NETWORK":"mainnet"}' > assets/env.json

      - name: Get version from pubspec.yaml
        working-directory: app
        run: |
          VERSION=$(awk -F ': ' '/^version:/ {print $2}' pubspec.yaml)
          VERSION_BASE=${VERSION%%+*}
          BUILD_NUMBER=$(date -u +%s)
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build APK arm64-v8a
        working-directory: app
        run: |
          flutter build apk \
            --build-name="$VERSION_BASE" \
            --build-number="$BUILD_NUMBER" \
            --target="lib/main/main.dart" \
            --debug \
            --target-platform android-arm64 \
            --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallet-${{ env.VERSION_BASE }}-${{ env.BUILD_NUMBER }}-arm64-v8a
          path: app/build/app/outputs/flutter-apk/*.apk
