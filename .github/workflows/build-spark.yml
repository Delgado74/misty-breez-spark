name: Build Spark

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout Spark SDK
        uses: actions/checkout@v4
        with:
          repository: breez/spark-sdk
          path: spark-sdk

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + installed tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/bin
          key: cargo-${{ hashFiles('spark-sdk/packages/flutter/rust/Cargo.lock') }}

      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: spark-sdk/packages/flutter/rust/target
          key: rust-target-${{ hashFiles('spark-sdk/packages/flutter/rust/Cargo.lock') }}
          restore-keys: rust-target-

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies for codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Generate Dart bindings
        working-directory: spark-sdk/packages/flutter
        run: |
          mkdir -p lib/src/rust
          flutter_rust_bridge_codegen generate

      - name: Fix pubspec paths for CI
        working-directory: app
        run: |
          find . -name pubspec.yaml -exec sed -i \
            's|/home/islabtc/AndroidStudioProjects/breezmisty/spark-sdk/packages/flutter|../spark-sdk/packages/flutter|g' {} +

      - name: Create env.json
        working-directory: app
        run: |
          echo '{"API_KEY":"${{ secrets.BREEZ_API_KEY }}","NETWORK":"mainnet"}' > assets/env.json

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Build APK
        working-directory: app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/app/outputs/flutter-apk/*.apk
